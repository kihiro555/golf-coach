<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Golf Swing Coach</title>
    <style>
        :root {
            --primary-color: #2E8B57; /* シーグリーン（ゴルフ場をイメージ） */
            --bg-color: #f4f7f6;
            --text-color: #333;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 1.5rem;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="password"], select, input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #246B43;
        }
        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }
        #resultArea {
            margin-top: 25px;
            padding: 15px;
            background-color: #eef7f2;
            border-left: 5px solid var(--primary-color);
            border-radius: 4px;
            white-space: pre-wrap;
            display: none;
        }
        .loader {
            text-align: center;
            margin-top: 20px;
            display: none;
            font-weight: bold;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⛳ AI Golf Swing Coach</h1>

    <div id="setupSection">
        <p>初回セットアップ：Gemini APIキーを入力してください。<br><small>※キーはブラウザに安全に保存され、次回から入力不要です。</small></p>
        <input type="password" id="apiKeyInput" placeholder="AIzaSy...">
        <button onclick="saveApiKey()">APIキーを保存して開始</button>
    </div>

    <div id="appSection" style="display: none;">
        <button onclick="resetApiKey()" style="background-color: #999; padding: 5px; font-size: 0.8rem; width: auto; float: right;">キーをリセット</button>
        <div style="clear: both;"></div>

        <label>使用クラブ</label>
        <select id="clubSelect">
            <option>7番アイアン</option>
            <option>9番アイアン</option>
            <option>ドライバー</option>
            <option>フェアウェイウッド</option>
            <option>ユーティリティ</option>
            <option>ウェッジ</option>
        </select>

        <label>打球の結果</label>
        <select id="resultSelect">
            <option>スライス（右に曲がる）</option>
            <option>フック（左に曲がる）</option>
            <option>ダフリ</option>
            <option>トップ</option>
            <option>ストレート</option>
        </select>

        <label>撮影アングル</label>
        <select id="angleSelect">
            <option>後方（飛球線後方）</option>
            <option>正面</option>
        </select>

        <label>スイング動画を選択 (数秒の短い動画推奨)</label>
        <input type="file" id="videoFile" accept="video/mp4,video/quicktime">

        <button id="analyzeBtn" onclick="analyzeVideo()">動画を分析する</button>

        <div class="loader" id="loader">AIがスイングを解析中です...<br>（数十秒かかる場合があります）</div>
        
        <div id="resultArea"></div>
    </div>
</div>

<script>
    // 起動時にAPIキーが保存されているかチェック
    window.onload = function() {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
        }
    };

    // APIキーの保存
    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value;
        if(key.trim() === "") {
            alert("APIキーを入力してください。");
            return;
        }
        localStorage.setItem('gemini_api_key', key);
        document.getElementById('setupSection').style.display = 'none';
        document.getElementById('appSection').style.display = 'block';
    }

    // APIキーのリセット（やり直したい時用）
    function resetApiKey() {
        localStorage.removeItem('gemini_api_key');
        location.reload();
    }

    // 動画分析の実行
    async function analyzeVideo() {
        const apiKey = localStorage.getItem('gemini_api_key');
        const club = document.getElementById('clubSelect').value;
        const result = document.getElementById('resultSelect').value;
        const angle = document.getElementById('angleSelect').value;
        const fileInput = document.getElementById('videoFile');

        if (!fileInput.files.length) {
            alert('動画ファイルを選択してください。');
            return;
        }

        const file = fileInput.files[0];
        
        // 画面の表示切り替え（ローディング中）
        document.getElementById('analyzeBtn').disabled = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';

        try {
            // 動画をBase64形式に変換
            const base64Data = await readFileAsBase64(file);
            const mimeType = file.type || "video/mp4";

            // システムプロンプト（AIへの厳格な指示）
            const systemInstruction = `
あなたはプロのゴルフスイング分析コーチです。感情的な励ましや共感は一切不要です。
映像から確認できる客観的な事実に基づき、最も修正すべき致命的なエラーから優先順位をつけて指摘してください。
専門用語は初心者にわかる範囲に留めてください。

出力フォーマット：
* **優先度1：[課題名]**
    * **事実:** [映像からわかる物理的な事実を簡潔に]
    * **対策:** [簡潔で具体的な修正アクション]
* **優先度2：[課題名]**...

※優先度の低いエラーには「まずは優先度1に集中するため、今は気にしなくていい」と明記すること。
            `;

            // ユーザー入力情報の合体
            const promptText = `使用クラブ: ${club}\n打球の結果: ${result}\n撮影アングル: ${angle}\nこの動画を分析し、修正点を優先順位順に出力してください。`;

            // Gemini API呼び出し用のデータ構造
            const requestBody = {
                systemInstruction: { parts: [{ text: systemInstruction }] },
                contents: [{
                    parts: [
                        { text: promptText },
                        { inlineData: { mimeType: mimeType, data: base64Data } }
                    ]
                }]
            };

            // Gemini 1.5 Flash APIへリクエスト送信
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || "通信エラーが発生しました");
            }

            // 結果のテキストを画面に表示
            const replyText = data.candidates[0].content.parts[0].text;
            document.getElementById('resultArea').innerHTML = replyText.replace(/\n/g, '<br>');
            document.getElementById('resultArea').style.display = 'block';

        } catch (error) {
            alert('エラーが発生しました: ' + error.message);
        } finally {
            // 処理完了後、ボタンを元に戻す
            document.getElementById('analyzeBtn').disabled = false;
            document.getElementById('loader').style.display = 'none';
        }
    }

    // ファイル読み込み用の補助関数
    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
                const base64String = reader.result.split(',')[1];
                resolve(base64String);
            };
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file);
        });
    }
</script>

</body>
</html>
